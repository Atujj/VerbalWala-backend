spring:
  application:
    name: verbalwala-backend

  data:
    mongodb:
      uri: ${MONGODB_URI}

server:
  port: ${PORT:8082}


jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

gemini:
  api:
    key: ${GEMINI_API_KEY}

  model: gemini-2.5-flash

frontend:
  url: ${FRONTEND_URL:http://localhost:5173}